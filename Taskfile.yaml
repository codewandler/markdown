version: "3"

tasks:
  demo:
    desc: Run the streaming Markdown demo
    dir: examples/demo
    cmd: go run . {{.CLI_ARGS}}

  demo:record:
    desc: Record the demo as a GIF using vhs
    deps: [demo:check-vhs]
    dir: examples/demo
    cmd: vhs demo.tape

  demo:check-vhs:
    desc: Check that vhs is installed
    internal: true
    silent: true
    preconditions:
      - sh: command -v vhs
        msg: "vhs is not installed. Install it: https://github.com/charmbracelet/vhs"

  test:
    desc: Run all tests
    cmd: go test ./stream ./terminal .

  test:stream:
    desc: Run stream package tests
    cmd: go test ./stream

  test:terminal:
    desc: Run terminal package tests
    cmd: go test ./terminal

  lint:
    desc: Run go vet
    cmd: go vet ./...

  build:
    desc: Build all packages
    cmd: go build ./...

  bench:
    desc: Run all benchmarks
    dir: benchmarks
    cmd: go test -bench=. -benchmem -count=1 -benchtime=1s -timeout=120s {{.CLI_ARGS}}

  bench:compare:
    desc: Run pipeline comparison benchmarks (us vs glamour)
    dir: benchmarks
    cmd: go test -bench=BenchmarkPipeline -benchmem -count=3 -benchtime=2s -timeout=300s {{.CLI_ARGS}}

  bench:chunks:
    desc: Run chunk size sensitivity benchmarks
    dir: benchmarks
    cmd: go test -bench=BenchmarkChunkSize -benchmem -count=1 -benchtime=1s {{.CLI_ARGS}}

  bench:render:
    desc: Run terminal render comparison and format as Markdown
    dir: benchmarks
    cmd: go test -bench=BenchmarkRender -benchmem -count=1 -benchtime=1s -timeout=120s | go run ./cmd/benchcompare

  bench:parse:
    desc: Run parse comparison and format as Markdown
    dir: benchmarks
    cmd: go test -bench=BenchmarkParse -benchmem -count=1 -benchtime=1s -timeout=120s | go run ./cmd/benchcompare

  bench:compliance:
    desc: Run spec compliance tests against all parsers
    dir: benchmarks
    cmd: go test -run "TestCommonMarkCompliance|TestGFMCompliance" -v

  # --- Competition pipeline (replaces bench:* tasks) ---

  competition:metadata:
    desc: "Stage 1: Discover metadata for all candidates"
    dir: competition
    cmd: go run ./cmd/comprun metadata {{.CLI_ARGS}}

  competition:compliance:
    desc: "Stage 2: Run CommonMark + GFM spec suites"
    dir: competition
    cmd: go run ./cmd/comprun compliance {{.CLI_ARGS}}

  competition:bench:
    desc: "Stage 3: Run benchmarks"
    dir: competition
    cmd: go run ./cmd/comprun bench {{.CLI_ARGS}}

  competition:report:
    desc: "Stage 4: Generate COMPARISON.md from latest results"
    dir: competition
    cmd: go run ./cmd/compgen --latest --out ../COMPARISON.md

  competition:full:
    desc: Run full competition pipeline (metadata + compliance + bench + report)
    dir: competition
    cmds:
      - go run ./cmd/comprun full {{.CLI_ARGS}}
      - go run ./cmd/compgen --latest --out ../COMPARISON.md
